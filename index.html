<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Loader</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232636;
    --border: #2e3248;
    --accent: #6c8ef5;
    --accent2: #a78bfa;
    --green: #34d399;
    --text: #e2e8f0;
    --text-muted: #7c8aaa;
    --flag: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; font-size: 15px; }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #1a1d27 0%, #141728 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .logo {
    font-family: 'DM Serif Display', serif; font-size: 1.2rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .header-right { display: flex; gap: 10px; align-items: center; margin-left: auto; flex-wrap: wrap; }
  .stat-chip {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--text-muted); white-space: nowrap;
  }
  .stat-chip span { color: var(--text); font-weight: 600; }

  /* ── Subject selector ── */
  .subject-bar {
    padding: 10px 16px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .subject-bar label { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
  .subject-bar select {
    background: var(--surface2); border: 1px solid var(--accent);
    color: var(--text); padding: 6px 12px; border-radius: 8px;
    font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; outline: none;
    flex: 1; min-width: 180px; max-width: 340px;
  }
  .load-status { font-size: 12px; color: var(--text-muted); }
  .load-status.error { color: #f87171; }
  .load-status.ok { color: var(--green); }

  /* ── Controls ── */
  .controls {
    padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .tab {
    background: transparent; border: 1px solid var(--border); color: var(--text-muted);
    padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 12px;
    font-family: 'DM Sans', sans-serif; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .per-page-wrap {
    display: flex; align-items: center; gap: 8px;
    margin-left: auto; font-size: 13px; color: var(--text-muted);
  }
  .per-page-wrap select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 5px 8px; border-radius: 8px;
    font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; outline: none;
  }

  /* ── Questions ── */
  .questions-wrap { max-width: 900px; margin: 0 auto; padding: 20px 14px; }
  .question-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px; margin-bottom: 16px;
  }
  .question-card.flagged { border-color: var(--flag); }
  .card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .q-meta { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; margin-top: 2px; }
  .q-number {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-size: 11px; font-weight: 700;
    padding: 3px 9px; border-radius: 20px; white-space: nowrap; letter-spacing: 0.04em;
  }
  .week-chip {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-muted); font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 20px; white-space: nowrap; text-align: center;
  }
  .q-text { font-size: 14px; line-height: 1.65; color: var(--text); font-weight: 500; flex: 1; }
  .flag-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 18px; padding: 2px 4px;
    flex-shrink: 0; -webkit-tap-highlight-color: transparent;
  }
  .flag-btn.flagged { color: var(--flag); }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  @media (max-width: 560px) { .options { grid-template-columns: 1fr; } }
  .option {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 9px; padding: 9px 12px; font-size: 13px; color: var(--text); line-height: 1.5;
  }
  .opt-label {
    display: inline-block; background: var(--border); color: var(--text-muted);
    border-radius: 4px; padding: 1px 6px; font-size: 11px; font-weight: 700;
    margin-right: 6px; letter-spacing: 0.05em;
  }
  .answer-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .answer-label { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
  .answer-box {
    background: var(--surface2); border: 1px dashed var(--border);
    border-radius: 8px; padding: 10px 14px; font-size: 13px; flex: 1; cursor: pointer;
    line-height: 1.5; text-align: center; color: var(--text-muted);
    -webkit-tap-highlight-color: transparent; min-height: 44px;
    display: flex; align-items: center; justify-content: center;
  }
  .answer-box.revealed {
    background: #1e2f2a; border-color: var(--green);
    border-style: solid; text-align: left; flex-direction: column; align-items: flex-start; color: var(--text);
  }
  .correct-tag {
    display: inline-block; background: var(--green); color: #0f2a20;
    border-radius: 5px; padding: 2px 9px; font-size: 11px; font-weight: 700;
    margin-right: 8px; letter-spacing: 0.04em;
  }
  .exp-text {
    margin-top: 8px; color: #94a3b8; font-size: 13px; line-height: 1.65;
    border-top: 1px solid var(--border); padding-top: 8px; width: 100%;
  }
  .hint-text { font-size: 13px; pointer-events: none; }

  /* ── Pagination ── */
  .pagination {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; padding: 24px 16px 44px; flex-wrap: wrap;
  }
  .page-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 10px 20px; border-radius: 9px; cursor: pointer; font-size: 14px;
    font-family: 'DM Sans', sans-serif; font-weight: 500; -webkit-tap-highlight-color: transparent; min-height: 44px;
  }
  .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .page-info { font-size: 13px; color: var(--text-muted); text-align: center; }
  .page-info strong { color: var(--text); }
  .reshuffle-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: #fff; padding: 10px 20px; border-radius: 9px;
    cursor: pointer; font-size: 14px; font-family: 'DM Sans', sans-serif;
    font-weight: 600; min-height: 44px; -webkit-tap-highlight-color: transparent;
  }
  .progress-bar-wrap { height: 3px; background: var(--border); position: fixed; top: 0; left: 0; right: 0; z-index: 200; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s ease; }

  /* ── Empty / loading states ── */
  .state-msg { text-align: center; padding: 80px 20px; color: var(--text-muted); }
  .state-msg .icon { font-size: 48px; margin-bottom: 16px; }
  .state-msg p { font-size: 14px; line-height: 1.7; }
</style>
</head>
<body>

<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>

<header>
  <div class="logo">📚 Quiz Loader</div>
  <div class="header-right">
    <div class="stat-chip"> <span id="totalCount">0</span> questions</div>
    <div class="stat-chip">Tag <span id="flagCount">0</span></div>
  </div>
</header>

<!-- ① Subject selector bar -->
<div class="subject-bar">
  <label>📂 Script：</label>
  <select id="subjectSel" onchange="loadSubject(this.value)">
    <option value="">── Select the Script ──</option>
    <option value="questions/cloud_security.json">Cloud Security（W1–W7）</option>
    <!-- new questions code
    <option value="questions/AIMS_2024.json">AIMS 2024</option>
    -->
  </select>
  <span class="load-status" id="loadStatus"></span>
</div>

<!-- ② Filter & per-page (hidden until loaded) -->
<div class="controls" id="controlsBar" style="display:none">
  <div class="filter-tabs" id="filterTabs">
    <button class="tab active" onclick="setFilter('all',this)">All</button>
    <button class="tab" onclick="setFilter('flagged',this)">⚑ Tag</button>
  </div>
  <div class="per-page-wrap">
    Each page wraps
    <select id="perPageSel" onchange="setPerPage(this.value)">
      <option value="5">5 Questions</option>
      <option value="10" selected>10 Questions</option>
      <option value="20">20 Questions</option>
      <option value="30">30 Questions</option>
    </select>
  </div>
</div>

<div class="questions-wrap" id="questionsWrap">
  <div class="state-msg">
    <div class="icon">📂</div>
    <p>Select the Script<br>Wait for loading</p>
  </div>
</div>

<div class="pagination" id="paginationBar" style="display:none">
  <button class="page-btn" id="prevBtn" onclick="goPage(-1)">Last</button>
  <div class="page-info" id="pageInfo"></div>
  <button class="page-btn" id="nextBtn" onclick="goPage(1)">Next</button>
  <button class="reshuffle-btn" onclick="reshuffleAll()">🔀 Shuffle</button>
</div>

<script>
var ALL_QUESTIONS = [];
var shuffled = [];
var flagged = {};
var currentPage = 0;
var perPage = 10;
var filter = 'all';

// ─── Fetch subject JSON ───────────────────────────────────────────────────────
function loadSubject(url) {
  if (!url) return;
  var status = document.getElementById('loadStatus');
  status.textContent = '載入中…';
  status.className = 'load-status';

  fetch(url)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      ALL_QUESTIONS = data.questions || [];
      flagged = {};
      filter = 'all';
      currentPage = 0;

      // Update title
      document.querySelector('.logo').textContent = '📚 ' + (data.title || 'Quiz');

      // Build week filter tabs
      buildWeekTabs(data.weeks || []);

      // Show controls & pagination
      document.getElementById('controlsBar').style.display = 'flex';
      document.getElementById('paginationBar').style.display = 'flex';

      status.textContent = '✓ Loaded ' + ALL_QUESTIONS.length + ' Question';
      status.className = 'load-status ok';

      shuffled = shuffle(ALL_QUESTIONS, Math.floor(Math.random() * 999999));
      render();
    })
    .catch(function(err) {
      status.textContent = '❌ Loaded error：' + err.message;
      status.className = 'load-status error';
    });
}

function buildWeekTabs(weeks) {
  var tabs = document.getElementById('filterTabs');
  var base = tabs.querySelectorAll('button');
  // Remove old week tabs (index >= 2)
  while (tabs.children.length > 2) tabs.removeChild(tabs.lastChild);
  // Reset active
  base[0].className = 'tab active';
  base[1].className = 'tab';

  weeks.forEach(function(w) {
    var n = parseInt(w.replace('W',''));
    var btn = document.createElement('button');
    btn.className = 'tab';
    btn.textContent = w;
    btn.setAttribute('onclick', 'setFilter(' + n + ',this)');
    tabs.appendChild(btn);
  });
}

// ─── Shuffle ─────────────────────────────────────────────────────────────────
function seededRand(seed) {
  var s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}
function shuffle(arr, seed) {
  var rand = seededRand(seed);
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rand() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

// ─── Render ──────────────────────────────────────────────────────────────────
function getVisible() {
  if (filter === 'flagged') return shuffled.filter(function(q){ return flagged[q.id]; });
  if (typeof filter === 'number') return shuffled.filter(function(q){ return q.week === filter; });
  return shuffled;
}

function render() {
  var visible = getVisible();
  var totalPages = Math.max(1, Math.ceil(visible.length / perPage));
  if (currentPage >= totalPages) currentPage = totalPages - 1;
  if (currentPage < 0) currentPage = 0;

  var start = currentPage * perPage;
  var batch = visible.slice(start, start + perPage);

  var fc = Object.keys(flagged).filter(function(k){ return flagged[k]; }).length;
  document.getElementById('flagCount').textContent = fc;
  document.getElementById('totalCount').textContent = visible.length;
  document.getElementById('progressBar').style.width = ((currentPage + 1) / totalPages * 100) + '%';
  document.getElementById('pageInfo').innerHTML =
    '<strong>' + (currentPage+1) + ' / ' + totalPages + '</strong>&nbsp;&nbsp;' + visible.length + ' 題';
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;

  var wrap = document.getElementById('questionsWrap');
  if (batch.length === 0) {
    wrap.innerHTML = '<div class="state-msg"><div class="icon">⚑</div><p>尚未標記任何題目</p></div>';
    return;
  }

  var html = '';
  for (var i = 0; i < batch.length; i++) {
    var q = batch[i];
    var isFlagged = !!flagged[q.id];
    var opts = '';
    for (var j = 0; j < q.opts.length; j++) {
      var letter = q.opts[j].charAt(0);
      var txt = q.opts[j].slice(3);
      opts += '<div class="option"><span class="opt-label">' + letter + '</span>' + escHtml(txt) + '</div>';
    }
    var ansOpt = '';
    for (var k = 0; k < q.opts.length; k++) {
      if (q.opts[k].charAt(0) === q.ans) { ansOpt = q.opts[k].slice(3); break; }
    }
    var expHtml = q.exp ? '<div class="exp-text">' + escHtml(q.exp) + '</div>' : '';
    html += '<div class="question-card' + (isFlagged ? ' flagged' : '') + '" id="card-' + q.id + '">'
      + '<div class="card-header">'
      + '<div class="q-meta"><span class="q-number">Q' + q.id + '</span>'
      + (q.week ? '<span class="week-chip">W' + q.week + '</span>' : '')
      + '</div>'
      + '<div class="q-text">' + escHtml(q.q) + '</div>'
      + '<button class="flag-btn' + (isFlagged ? ' flagged' : '') + '" onclick="toggleFlag(' + q.id + ')">⚑</button>'
      + '</div>'
      + '<div class="options">' + opts + '</div>'
      + '<div class="answer-row"><span class="answer-label">答案：</span>'
      + '<div class="answer-box" onclick="revealAns(this)">'
      + '<span class="hint-text">👆 Show answer</span>'
      + '<div class="answer-inner" style="display:none">'
      + '<span class="correct-tag">✓ ' + q.ans + '</span>'
      + escHtml(ansOpt) + expHtml
      + '</div>'
      + '</div></div>'
      + '</div>';
  }
  wrap.innerHTML = html;
  window.scrollTo(0, 0);
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function revealAns(el) {
  el.classList.toggle('revealed');
  var inner = el.querySelector('.answer-inner');
  var hint = el.querySelector('.hint-text');
  if (el.classList.contains('revealed')) {
    inner.style.display = 'block'; hint.style.display = 'none';
  } else {
    inner.style.display = 'none'; hint.style.display = 'block';
  }
}

function toggleFlag(id) { flagged[id] = !flagged[id]; render(); }
function goPage(dir) { currentPage += dir; render(); }
function setFilter(f, btn) {
  filter = f; currentPage = 0;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  btn.classList.add('active');
  render();
}
function setPerPage(v) { perPage = parseInt(v); currentPage = 0; render(); }
function reshuffleAll() {
  shuffled = shuffle(ALL_QUESTIONS, Math.floor(Math.random() * 999999));
  currentPage = 0; render();
}
</script>
</body>
</html>
